# Approval Policies Configuration

# Define approval rules and thresholds for automated routing and decision-making

policies:
  # Auto-approval rules (items that don't need human review)
  auto_approve:
    - type: email
      cost: 0
      priority: low
      conditions:
        - "recipient is internal"
        - "no attachments"

    - type: expense
      cost: "<100"
      category: "office_supplies"

    - type: social_post
      priority: low
      conditions:
        - "pre-approved template"

  # Items requiring approval
  require_approval:
    - type: plan
      cost: ">10000"

    - type: email
      priority: high
      conditions:
        - "external recipient"
        - "contains pricing"

    - type: contract
      # All contracts require approval

    - type: expense
      cost: ">100"

  # Escalation rules
  escalate:
    - cost: ">100000"
      escalate_to: "Board of Directors"
      notice_period: "7 days"

    - priority: critical
      escalate_to: "CEO"
      immediate: true

    - pending_duration: ">48 hours"
      escalate_to: "COO"

# Approval thresholds by value
thresholds:
  budget:
    low: 10000
    medium: 50000
    high: 100000
    critical: 500000

  time:
    short: "1 week"
    medium: "1 month"
    long: "3 months"
    extended: "6 months"

# Tiered approval by cost
approval_tiers:
  - max_cost: 10000
    approver: "Manager"
    sla_hours: 4

  - max_cost: 50000
    approver: "Director"
    sla_hours: 24

  - max_cost: 100000
    approver: "VP"
    sla_hours: 48

  - max_cost: 999999999
    approver: "CEO"
    sla_hours: 72

# Routing rules by type
routing:
  legal:
    approver: "Legal Team"
    sla_hours: 48
    require_signature: true

  financial:
    approver: "CFO"
    sla_hours: 24
    require_documentation: true

  technical:
    approver: "CTO"
    sla_hours: 24

  marketing:
    approver: "CMO"
    sla_hours: 12

  hr:
    approver: "HR Director"
    sla_hours: 48
    confidential: true

# SLA (Service Level Agreement) by priority
sla:
  critical:
    response_time: "1 hour"
    decision_time: "4 hours"
    escalate_after: "2 hours"

  high:
    response_time: "4 hours"
    decision_time: "24 hours"
    escalate_after: "48 hours"

  medium:
    response_time: "24 hours"
    decision_time: "72 hours"
    escalate_after: "96 hours"

  low:
    response_time: "72 hours"
    decision_time: "1 week"
    escalate_after: "2 weeks"

# Notification settings
notifications:
  new_item:
    notify: ["approver"]
    method: ["email", "slack"]

  pending_24h:
    notify: ["approver", "manager"]
    method: ["email"]

  pending_48h:
    notify: ["approver", "manager", "escalation_contact"]
    method: ["email", "slack", "sms"]

  high_priority:
    notify: ["approver", "ceo"]
    method: ["email", "slack", "sms"]
    immediate: true

  approved:
    notify: ["submitter", "executor"]
    method: ["email"]

  rejected:
    notify: ["submitter"]
    method: ["email"]
    include_feedback: true

# Approval requirements
requirements:
  documentation:
    - type: plan
      required_fields:
        - objective
        - budget
        - timeline
        - risks
        - success_criteria

    - type: expense
      required_fields:
        - amount
        - category
        - justification
        - receipt

  approval_notes:
    required: true
    min_length: 20
    fields:
      - rationale
      - conditions
      - concerns

  rejection_feedback:
    required: true
    min_length: 50
    must_include:
      - reason
      - suggestions
      - resubmission_process

# Audit and compliance
audit:
  log_all_actions: true
  retention_period: "7 years"
  include_metadata:
    - timestamp
    - approver
    - decision
    - rationale
    - item_details

  review_frequency:
    high_value: "monthly"
    standard: "quarterly"
    low_value: "annually"

# Delegation rules
delegation:
  allowed: true
  max_duration: "30 days"
  require_notification: true
  delegate_to:
    - "direct_report"
    - "peer_with_approval"

  cannot_delegate:
    - cost: ">100000"
    - type: "contract"
    - priority: "critical"

# Exception handling
exceptions:
  emergency:
    allow_post_approval: true
    require_justification: true
    notify_immediately: ["CEO", "COO"]
    review_within: "24 hours"

  weekend_urgent:
    on_call_approver: "Duty Manager"
    escalation_path: ["Duty Manager", "VP", "CEO"]

# Metrics and reporting
metrics:
  track:
    - approval_time_avg
    - approval_time_median
    - approval_rate
    - rejection_rate
    - escalation_rate
    - sla_compliance
    - approver_workload
    - bottleneck_analysis

  reports:
    daily:
      - pending_count
      - overdue_items
      - high_priority_items

    weekly:
      - approval_metrics
      - approver_performance
      - trend_analysis

    monthly:
      - comprehensive_report
      - policy_effectiveness
      - recommendations

# Integration settings
integrations:
  email:
    enabled: true
    smtp_server: "smtp.company.com"
    from_address: "approvals@company.com"

  slack:
    enabled: true
    webhook_url: "https://hooks.slack.com/..."
    channel: "#approvals"

  calendar:
    enabled: true
    add_deadlines: true
    reminder_before: "4 hours"

  dashboard:
    enabled: true
    refresh_interval: "5 minutes"
    display_metrics: true
