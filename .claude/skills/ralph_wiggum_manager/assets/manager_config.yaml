manager:
  name: "Ralph Wiggum Manager"
  version: "1.0"
  description: "Autonomous loop orchestrator for complete workflow management"

loop:
  enabled: true
  interval: 60  # seconds between cycles
  max_cycles: 0  # 0 = infinite
  max_duration: 0  # 0 = infinite (seconds)

vault:
  path: "./vault"
  folders:
    - Inbox
    - Needs_Action
    - Pending_Approval
    - Approved
    - Rejected
    - Done

skills:
  triage_inbox:
    enabled: true
    trigger: "inbox_not_empty"
    timeout: 300
    max_retries: 3
    retry_delay: 60
    description: "Process items in Inbox folder"

  strategic_planner:
    enabled: true
    trigger: "needs_action_not_empty"
    timeout: 600
    max_retries: 3
    retry_delay: 60
    description: "Create strategic plans for items"

  approval_monitor:
    enabled: true
    trigger: "pending_approval_not_empty"
    mode: "notify"  # notify, interactive, auto
    timeout: 300
    description: "Monitor and manage approvals"

  executor:
    enabled: true
    trigger: "approved_not_empty"
    timeout: 900
    max_retries: 3
    retry_delay: 60
    description: "Execute approved actions"

  metric_auditor:
    enabled: true
    trigger: "done_updated"
    schedule: "daily"
    timeout: 300
    description: "Generate metrics and reports"

monitoring:
  enabled: true
  health_check_interval: 300  # seconds
  metrics_interval: 60  # seconds
  dashboard_update_interval: 300  # seconds

  alerts:
    - condition: "error_rate > 0.1"
      severity: warning
      action: notify
      message: "High error rate detected"

    - condition: "queue_depth > 20"
      severity: warning
      action: notify
      message: "Queue depth exceeds threshold"

    - condition: "skill_timeout"
      severity: critical
      action: alert
      message: "Skill execution timeout"

    - condition: "circuit_breaker_open"
      severity: critical
      action: alert
      message: "Circuit breaker opened"

error_handling:
  retry_enabled: true
  max_retries: 3
  retry_delay: 60  # seconds
  backoff_multiplier: 2

  on_error:
    - log_error
    - notify_admin
    - attempt_recovery

  critical_errors:
    - vault_corruption
    - skill_unavailable
    - resource_exhaustion

logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/manager.log"
  rotation: "daily"  # daily, weekly, size
  retention: 30  # days
  max_size: 10485760  # 10MB

  structured: true
  include_context: true
  include_stack_trace: true

  sampling:
    enabled: false
    rate: 0.1  # Log 10% of debug messages

optimization:
  # Skip empty folders to save time
  skip_empty_folders: true

  # Batch processing
  batch_size: 10
  batch_enabled: false

  # Parallel execution
  parallel_stages: false
  max_workers: 3

  # Cache skill results
  cache_enabled: false
  cache_ttl: 300  # seconds

resources:
  # CPU limits
  max_cpu_percent: 80

  # Memory limits
  max_memory_mb: 2048

  # Disk space
  min_disk_space_gb: 10

  # Connection pools
  max_connections: 50

security:
  # Require authentication
  auth_required: false

  # API key for remote access
  api_key: ""

  # Allowed operations
  allowed_operations:
    - read
    - write
    - execute

audit:
  enabled: true
  log_file: "logs/audit.log"

  events:
    - skill_execution
    - state_changes
    - error_occurrences
    - configuration_changes

  retention: 90  # days

parallel:
  enabled: false
  max_workers: 3
  stages:
    - inbox
    - needs_action
    - approved

priority:
  enabled: false
  levels:
    critical: 1
    high: 2
    medium: 3
    low: 4

conditions:
  - stage: planning
    condition: "item_count > 5"
    action: batch_process

  - stage: approval
    condition: "priority == 'critical'"
    action: notify_immediately

hooks:
  pre_triage:
    - validate_inbox_items
    - check_duplicates

  post_execution:
    - update_dashboard
    - send_notifications

  on_error:
    - log_error
    - attempt_recovery
    - notify_admin

state_persistence:
  enabled: false
  file: "state/manager_state.json"
  save_interval: 300  # seconds

advanced:
  # Adaptive retry - adjust based on success rate
  adaptive_retry:
    enabled: false
    min_delay: 0.5
    max_delay: 120.0

  # Exponential backoff with decorrelated jitter
  decorrelated_jitter:
    enabled: false

  # Custom retry strategies by service
  service_strategies:
    triage_inbox:
      max_retries: 3
      base_delay: 1.0
      jitter: true

    strategic_planner:
      max_retries: 5
      base_delay: 2.0
      jitter: true

    executor:
      max_retries: 3
      base_delay: 5.0
      jitter: false
